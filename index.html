<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumoora</title>

  <!-- CSS link -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <main>
    <svg
      class="face"
      viewBox="0 0 320 380"
      width="320"
      height="380"
      aria-label="A 404 animated face"
    >
      <g
        fill="none"
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="25"
      >

        <!-- Eyes -->
        <g class="face__eyes" transform="translate(0, 112.5)">
          <g transform="translate(15, 0)">
            <polyline class="face__eye-lid" points="37,0 0,120 75,120" />
            <polyline class="face__pupil" points="55,120 55,155" stroke-dasharray="35 35" />
          </g>

          <g transform="translate(230, 0)">
            <polyline class="face__eye-lid" points="37,0 0,120 75,120" />
            <polyline class="face__pupil" points="55,120 55,155" stroke-dasharray="35 35" />
          </g>
        </g>

        <!-- Nose -->
        <rect
          class="face__nose"
          rx="4"
          ry="4"
          x="132.5"
          y="112.5"
          width="55"
          height="155"
        />

        <!-- Mouth -->
        <g stroke-dasharray="102 102" transform="translate(65, 334)">
          <path
            class="face__mouth-left"
            d="M 0 30 C 0 30 40 0 95 0"
            stroke-dashoffset="-102"
          />
          <path
            class="face__mouth-right"
            d="M 95 0 C 150 0 190 30 190 30"
            stroke-dashoffset="102"
          />
        </g>

      </g>
    </svg>
  </main>
</body>
</html>
